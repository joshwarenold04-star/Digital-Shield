{% extends "base.html" %}

{% block title %}Login – Digital Shield{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="shield-icon">🛡️</div>
      <h2>Digital Shield</h2>
    </div>

    <h3 class="auth-title">Welcome Back</h3>
    <p class="auth-sub">Enter credentials to access your safety panel</p>

    <form action="{{ url_for('login') }}" method="POST">
      <div class="form-group">
        <label for="email" class="form-label">Email or Mobile Number</label>
        <input type="text" id="email" name="email" class="form-control" placeholder="Enter Email or Mobile Number" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block mt-3">Secure Login</button>
    </form>

    <p class="text-center mt-3" style="font-size: 0.88rem; color: var(--text-muted);">
      Don't have an account? <a href="{{ url_for('register') }}" class="text-blue fw-bold">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
